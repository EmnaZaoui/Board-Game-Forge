syntax = "proto3";
package gamedesigner;

message Game {
  string id = 1; string name = 2; string description = 3; string rules = 4;
  string creatorId = 5; double averageRating = 6; repeated string categories = 7; string createdAt = 8;
}
message CreateGameRequest { string name = 1; string description = 2; string rules = 3; string creatorId = 4; repeated string categories = 5; }
message CreateGameResponse { Game game = 1; }
message GetGameRequest { string gameId = 1; }
message GetGameResponse { Game game = 1; }
message UpdateGameRequest { string gameId = 1; string name = 2; string description = 3; string rules = 4; repeated string categories = 5; }
message UpdateGameResponse { bool success = 1; }
message DeleteGameRequest { string gameId = 1; }
message DeleteGameResponse { bool success = 1; }
message ListGamesRequest {}
message ListGamesResponse { repeated Game games = 1; }
message UpdateRatingRequest { string gameId = 1; double newAverage = 2; }
message UpdateRatingResponse { bool success = 1; }

service GameDesignerService {
  rpc CreateGame(CreateGameRequest) returns (CreateGameResponse);
  rpc GetGame(GetGameRequest) returns (GetGameResponse);
  rpc UpdateGame(UpdateGameRequest) returns (UpdateGameResponse);
  rpc DeleteGame(DeleteGameRequest) returns (DeleteGameResponse);
  rpc ListGames(ListGamesRequest) returns (ListGamesResponse);
  rpc UpdateRating(UpdateRatingRequest) returns (UpdateRatingResponse);
}
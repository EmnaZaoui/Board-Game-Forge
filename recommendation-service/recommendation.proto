syntax = "proto3";
package recommendation;

message GameRecommendation { string gameId = 1; string name = 2; double score = 3; }
message GetRecommendationsRequest { string userId = 1; int32 limit = 2; }
message GetRecommendationsResponse { repeated GameRecommendation recommendations = 1; }

service RecommendationService {
  rpc GetRecommendations(GetRecommendationsRequest) returns (GetRecommendationsResponse);
}